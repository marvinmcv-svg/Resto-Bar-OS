name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  owasp-zap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/api/package.json'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/api

      - name: Build application
        run: npm run build
        working-directory: apps/api

      - name: Run ZAP scan (OWASP Top 10)
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:3001/api/v1/health'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_on_active_警报: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            zap_report.html
            .zap/*.json
          retention-days: 30

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: apps/api

      - name: Check for known vulnerabilities
        run: |
          npm ls --depth=0 | grep -i vulnerable || true
        working-directory: apps/api

  code-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          git log --all --oneline --decorate -5
          git diff --staged --name-only
          git diff HEAD --name-only
        shell: powershell

      - name: Run Gitleaks
        uses: gitleaks/gitleaks@v8.18
        with:
          args: '--path . --verbose'
