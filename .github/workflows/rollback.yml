name: Rollback Railway Deployment

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to rollback'
        required: true
        type: choice
        options:
          - api
          - web
      version:
        description: 'Deployment ID to rollback to (leave blank for previous)'

jobs:
  rollback:
    name: Rollback ${{ inputs.service }}
    runs-on: ubuntu-latest
    steps:
      - name: Rollback
        run: |
          railway login --token ${{ secrets.RAILWAY_API_TOKEN }}
          railway rollback --service ${{ inputs.service }} ${{ inputs.version || '' }}
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
